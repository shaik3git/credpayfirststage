# =====================================================================
# Payment Service - ClusterIP (reached via Ingress at /api/payment)
# =====================================================================
apiVersion: v1
kind: Service
metadata:
  name: payment-service
  namespace: credpay
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: credpay
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: payment-service
  ports:
    - name: http
      port: 8000
      targetPort: http
