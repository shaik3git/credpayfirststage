# =====================================================================
# Payment Service (FastAPI / Python 3) - REST API on port 8000
# =====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: payment-service
  namespace: credpay
  labels:
    app.kubernetes.io/name: payment-service
    app.kubernetes.io/part-of: credpay
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: payment-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: payment-service
        app.kubernetes.io/part-of: credpay
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1001
        seccompProfile:
          type: RuntimeDefault
      volumes:
        - name: tmp
          emptyDir: {}
      containers:
        - name: payment-service
          # Images live in the existing ACR (credproj.azurecr.io). AKS is
          # attached to it via: az aks update --attach-acr credproj
          image: credappacr.azurecr.io/credpay/payment-service:latest
          # "Always" because the tag is the mutable `:latest` - IfNotPresent
          # would let a node keep serving a stale cached image after a fresh
          # push + `kubectl rollout restart`.
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8000
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          envFrom:
            - configMapRef:
                name: credpay-config
          env:
            - name: DB_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: credpay-db
                  key: DB_PASSWORD
          startupProbe:
            httpGet:
              path: /health
              port: http
            failureThreshold: 20
            periodSeconds: 3
          readinessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /health
              port: http
            initialDelaySeconds: 15
            periodSeconds: 20
          resources:
            requests:
              cpu: "100m"
              memory: "128Mi"
            limits:
              cpu: "300m"
              memory: "256Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
