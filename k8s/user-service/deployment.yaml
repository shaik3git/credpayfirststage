# =====================================================================
# User Service (Spring Boot / Java 21) - REST API on port 8080
# =====================================================================
# Probes are TCP-based: the app currently has NO spring-boot-starter-actuator,
# so there is no /actuator/health endpoint. Add actuator (see Step 6) to
# switch these to httpGet /actuator/health/{liveness,readiness}.
# =====================================================================
apiVersion: apps/v1
kind: Deployment
metadata:
  name: user-service
  namespace: credpay
  labels:
    app.kubernetes.io/name: user-service
    app.kubernetes.io/part-of: credpay
spec:
  replicas: 2
  revisionHistoryLimit: 5
  selector:
    matchLabels:
      app.kubernetes.io/name: user-service
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app.kubernetes.io/name: user-service
        app.kubernetes.io/part-of: credpay
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 1000
        seccompProfile:
          type: RuntimeDefault
      volumes:
        # Tomcat/JVM need a writable temp dir when the root FS is read-only.
        - name: tmp
          emptyDir: {}
      containers:
        - name: user-service
          # Images live in the existing ACR (credproj.azurecr.io). AKS is
          # attached to it via: az aks update --attach-acr credproj
          image: credappacr.azurecr.io/credpay/user-service:latest
          # "Always" because the tag is the mutable `:latest` - IfNotPresent
          # would let a node keep serving a stale cached image after a fresh
          # push + `kubectl rollout restart`.
          imagePullPolicy: Always
          ports:
            - name: http
              containerPort: 8080
          volumeMounts:
            - name: tmp
              mountPath: /tmp
          envFrom:
            - configMapRef:
                name: credpay-config
          env:
            - name: SPRING_DATASOURCE_PASSWORD
              valueFrom:
                secretKeyRef:
                  name: credpay-db
                  key: SPRING_DATASOURCE_PASSWORD
          startupProbe:
            tcpSocket:
              port: http
            # Spring Boot can take a while to start; allow up to 60s.
            failureThreshold: 20
            periodSeconds: 3
          readinessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 5
            periodSeconds: 10
          livenessProbe:
            tcpSocket:
              port: http
            initialDelaySeconds: 30
            periodSeconds: 20
          resources:
            requests:
              cpu: "250m"
              memory: "512Mi"
            limits:
              cpu: "500m"
              memory: "768Mi"
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            capabilities:
              drop: ["ALL"]
