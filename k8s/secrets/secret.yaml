# =====================================================================
# CredPay database credentials  ***EXAMPLE ONLY - DO NOT COMMIT REAL VALUES***
# =====================================================================
# This file documents the shape of the Secret the pods expect. Do NOT put a
# real password here or commit one to git.
#
# The pipeline (azure-pipelines.yml) creates the real Secret on every run by
# reading the password out of Azure Key Vault (AzureKeyVault@2) and running:
#
#   kubectl create secret generic credpay-db --namespace credpay \
#     --from-literal=DB_PASSWORD="$DB_PASSWORD" \
#     --from-literal=SPRING_DATASOURCE_PASSWORD="$DB_PASSWORD" \
#     --dry-run=client -o yaml | kubectl apply -f -
#
# Doing it manually from a local terraform output instead:
#
#   kubectl create secret generic credpay-db \
#     --namespace credpay \
#     --from-literal=DB_PASSWORD="$(terraform -chdir=../../terraform output -raw postgres_admin_password)" \
#     --from-literal=SPRING_DATASOURCE_PASSWORD="$(terraform -chdir=../../terraform output -raw postgres_admin_password)"
#
# Either way this stays a plain Kubernetes Secret - no CSI driver, no
# Workload Identity, no Managed Identity. Pods never talk to Key Vault
# directly; only the pipeline agent does. The stringData values below are
# placeholders for illustration.
# =====================================================================
apiVersion: v1
kind: Secret
metadata:
  name: credpay-db
  namespace: credpay
  labels:
    app.kubernetes.io/part-of: credpay
type: Opaque
stringData:
  DB_PASSWORD: "REPLACE_ME"              # consumed by payment-service (FastAPI)
  SPRING_DATASOURCE_PASSWORD: "REPLACE_ME" # consumed by user-service (Spring Boot)
