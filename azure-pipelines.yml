
trigger:
- main

pool:
  vmImage: ubuntu-latest

# =========================================================
# VARIABLES
# =========================================================
#
# Values below follow the same "hardcode it, no placeholders" convention
# used everywhere else in this repo (ACR name, Postgres FQDN, etc). They
# are safe to hardcode because none of them are secrets - the only real
# secret (the Postgres password) never appears in this file: it is
# generated by Terraform, pushed into Key Vault, and read back by the
# AzureKeyVault@2 task at deploy time.
#
# subscription_id is NOT passed from here - Azure DevOps secret pipeline
# variables can't be expanded into a task's `commandOptions` input (only
# into script env: mappings), so it lives in terraform/terraform.tfvars
# and Terraform picks it up automatically.

variables:

  # Azure service connections
  acrServiceConnection: 'cred-acr'
  azureServiceConnection: 'credappserviceconnection'

  # ACR resource name (not the service connection name above) - needed for
  # `az aks update --attach-acr`, which takes the registry's own name.
  acrName: 'credappacr'

  # Image tag - every build is pushed as both $(tag) and :latest
  tag: '$(Build.BuildId)'

  # Repositories in ACR
  frontendRepository: 'credpay/frontend'
  userRepository: 'credpay/user-service'
  paymentRepository: 'credpay/payment-service'

  # Terraform remote state backend
  tfStateRG: 'CredApp'
  tfStateStorage: 'credprojectstate'
  tfStateContainer: 'statefile'
  tfStateKey: 'credpays4.terraform.tfstate'

  # AKS cluster - deterministic names from terraform/main.tf's
  # name_prefix = "credpay" (rg-credpay / aks-credpay)
  aksResourceGroup: 'rg-credpays4'
  aksClusterName: 'aks-credpays4'
  k8sNamespace: 'credpay'

  # Azure Key Vault - created out-of-band (like the ACR), in the CredProj
  # bootstrap RG (same RG as the Terraform state storage account, not
  # rg-credpay). Terraform writes the Postgres secrets into it; the
  # pipeline reads them back below.
  keyVaultName: 'credappKV'
  keyVaultResourceGroup: 'CredApp'

# =========================================================
# STAGES
# =========================================================

stages:

# =========================================================
# STAGE 1 - TERRAFORM
# Provisions/updates AKS, PostgreSQL, networking, Log Analytics, and
# pushes the PostgreSQL credentials into the existing Azure Key Vault.
# =========================================================

- stage: Terraform
  displayName: Terraform Infrastructure

  jobs:

  - job: TerraformApply
    displayName: Terraform Init & Apply

    steps:

    - checkout: self

    - task: TerraformInstaller@1
      displayName: Install Terraform
      inputs:
        terraformVersion: latest

    - task: TerraformTask@5
      displayName: Terraform Init
      inputs:
        provider: azurerm
        command: init
        workingDirectory: terraform
        backendServiceArm: $(azureServiceConnection)
        backendAzureRmResourceGroupName: $(tfStateRG)
        backendAzureRmStorageAccountName: $(tfStateStorage)
        backendAzureRmContainerName: $(tfStateContainer)
        backendAzureRmKey: $(tfStateKey)
    - task: TerraformTask@5
      displayName: Terraform Apply (infra + push secrets to Key Vault)
      inputs:
        provider: azurerm
        command: destroy
        workingDirectory: terraform
        commandOptions: >-
          -auto-approve
        environmentServiceNameAzureRM: $(azureServiceConnection)


